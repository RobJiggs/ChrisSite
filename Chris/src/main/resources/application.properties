
spring.datasource.url=jdbc:sqlserver://anneb.database.windows.net:1433;database=Chrisdb
spring.datasource.username=rob@anneb
spring.datasource.password=password hidden until i hide the data.
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


#hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port:8080
app.baseURL=http://localhost:4200

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false


hibernate.enhancer.enableAssociationManagement=true
hibernate.enhancer.enableDirtyTracking=true
hibernate.enhancer.enableLazyInitialization=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

paypal.mode=sandbox
paypal.client.id=info hidden
paypal.client.secret=info hidden

spring.mail.host=smtp.gmail.com
spring.mail.port=hidden
spring.mail.username=hidden
spring.mail.password=hidden
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
